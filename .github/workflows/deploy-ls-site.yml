name: Deploy LS Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile-taro/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile-taro
        run: npm ci

      - name: Validate API base URL
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL repository variable is required for production build."
            exit 1
          fi

      - name: Build H5
        working-directory: apps/mobile-taro
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          H5_PUBLIC_ORIGIN: https://ls.buma55.com
        run: npm run build:h5


      - name: Set custom domain
        working-directory: apps/mobile-taro/dist
        run: echo "ls.buma55.com" > CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile-taro/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
