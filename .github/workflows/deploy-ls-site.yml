name: Deploy LS Site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile-taro/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile-taro
        run: npm ci

      - name: Build H5
        working-directory: apps/mobile-taro
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: npm run build:h5

      - name: Create entry index
        working-directory: apps/mobile-taro/dist
        run: |
          cat > index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta
                name="viewport"
                content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
              />
              <title>姚律师</title>
              <link rel="stylesheet" href="./css/app.css" />
            </head>
            <body>
              <div id="app"></div>
              <script src="./js/245.js"></script>
              <script src="./js/app.js"></script>
            </body>
          </html>
          EOF

      - name: Set custom domain
        working-directory: apps/mobile-taro/dist
        run: echo "ls.buma55.com" > CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile-taro/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
